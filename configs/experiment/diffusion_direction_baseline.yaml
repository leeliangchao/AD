datamodule:
  name: mvtec_single_class
  params:
    root: ../../tests/fixtures/mvtec
    category: bottle
    reference_index: 0
    image_size: [32, 32]
    batch_size: 2
    num_workers: 0
    normalize: false

representation:
  name: pixel
  params: {}

normality:
  name: diffusion_inversion_basic
  params:
    backend: legacy
    input_channels: 3
    base_channels: 16
    channel_mults: [1, 2, 2]
    num_res_blocks: 2
    time_embed_dim: 64
    conditioning_hidden_dim: 96
    num_train_timesteps: 100
