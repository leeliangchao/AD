    batch_size: 2
    noise_level: 0.2
    num_steps: 6
    step_size: 0.1
    initial_noise_scale: 0.2
    rollout_gain: 1.1
    denoised_blend: 0.2

evidence:
  name: direction_mismatch
  params:
    aggregator: mean
    direction_reduce: sum

evaluator:
  name: basic_ad
  params: {}

protocol:
  name: one_class
  params: {}
