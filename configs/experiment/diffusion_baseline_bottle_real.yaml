runtime_config: configs/runtime/real.yaml

datamodule:
  name: mvtec_single_class
  params:
    root: ../../data/mvtec
    category: bottle
    image_size: [256, 256]
    batch_size: 16
    num_workers: 4
    normalize: false

representation:
  name: pixel
  params: {}

normality:
  name: diffusion_basic
  params:
    backend: legacy
    input_channels: 3
    base_channels: 32
    channel_mults: [1, 2, 4]
    num_res_blocks: 3
    time_embed_dim: 128
    conditioning_hidden_dim: 256
    num_train_timesteps: 250
    learning_rate: 2.0e-4
    epochs: 80
    batch_size: 16
    noise_level: 0.2

evidence:
  name: noise_residual
  params:
    aggregator: mean

evaluator:
  name: basic_ad
  params: {}

protocol:
  name: one_class
  params: {}
