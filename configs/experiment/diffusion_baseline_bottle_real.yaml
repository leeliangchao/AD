runtime_config: configs/runtime/real.yaml

overrides:
  trainer:
    max_epochs: 10
  dataloader:
    batch_size: 32
  optimization:
    lr: 1.0e-4
  dataset:
    image_size: [256, 256]
  normality:
    backend: legacy

datamodule:
  name: mvtec_single_class
  params:
    root: ../../data/mvtec
    category: bottle
    image_size: [32, 32]
    batch_size: 2
    num_workers: 0
    normalize: false

representation:
  name: pixel
  params: {}

normality:
  name: diffusion_basic
  params:
    backend: legacy
    input_channels: 3
    base_channels: 16
    channel_mults: [1, 2, 2]
    num_res_blocks: 2
    time_embed_dim: 64
    num_train_timesteps: 100
    learning_rate: 0.001
    epochs: 1
    batch_size: 2
    noise_level: 0.2

evidence:
  name: noise_residual
  params:
    aggregator: mean

evaluator:
  name: basic_ad
  params: {}

protocol:
  name: one_class
  params: {}
